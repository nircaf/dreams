<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Dreamz</title>
    <meta name="description" content="Contact Dreamz support by email or mail.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://hypnodreamz.com/contact.html">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Contact Us - Dreamz">
    <meta property="og:description" content="Reach Dreamz support for help, questions, and product inquiries.">
    <meta property="og:url" content="https://hypnodreamz.com/contact.html">
    <meta property="og:site_name" content="Dreamz">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@200;300;400;500&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ink: #04050d;
            --deep: #0d1330;
            --indigo: #2a3580;
            --iris: #4a5bcc;
            --lavender: #8b9de8;
            --glow: #b8c4f8;
            --violet: #818CF8;
            --soft: #e8ebff;
            --white: #f4f6ff;
            --muted: rgba(184, 196, 248, 0.52);
            --border: rgba(138, 157, 232, 0.15);
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(ellipse 70% 55% at 30% 22%, rgba(74, 91, 204, 0.12), transparent 72%),
                linear-gradient(180deg, rgba(42, 53, 128, 0.12) 0%, transparent 42%),
                var(--ink);
            color: var(--soft);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            line-height: 1.75;
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 1.4rem 4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(4, 5, 13, 0.95) 0%, rgba(4, 5, 13, 0.8) 100%);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            display: inline-flex;
            align-items: center;
            width: clamp(180px, 28vw, 320px);
            line-height: 0;
            text-decoration: none;
        }

        .dreamz-logo {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0.75;
        }

        .nav-links,
        .footer-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            flex-wrap: wrap;
        }

        .nav-links a,
        .footer-links a {
            font-size: 0.78rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-links a:hover,
        .footer-links a:hover {
            color: var(--white);
        }

        .page-hero {
            padding: 10rem 4rem 4rem;
            border-bottom: 1px solid var(--border);
        }

        .page-eyebrow {
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--violet);
            margin-bottom: 1rem;
        }

        .page-title {
            max-width: 760px;
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 6vw, 5.2rem);
            font-weight: 300;
            color: var(--white);
            line-height: 1.05;
            margin-bottom: 1.5rem;
        }

        .page-intro {
            max-width: 620px;
            color: var(--muted);
            font-size: 1rem;
        }

        .contact-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 5rem 4rem 8rem;
        }

        .contact-panel {
            display: grid;
            gap: 2rem;
            padding: 2.5rem;
            background: rgba(13, 19, 48, 0.58);
            border: 1px solid var(--border);
            border-left: 3px solid var(--violet);
            backdrop-filter: blur(6px);
        }

        .contact-item {
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .contact-item:last-child {
            padding-bottom: 0;
            border-bottom: none;
        }

        .contact-label {
            display: block;
            margin-bottom: 0.55rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--violet);
        }

        .contact-value,
        .contact-value a {
            color: var(--white);
            font-size: clamp(1.15rem, 2vw, 1.45rem);
            text-decoration: none;
        }

        .contact-value a {
            border-bottom: 1px solid rgba(129, 140, 248, 0.45);
            transition: color 0.3s, border-color 0.3s;
        }

        .contact-value a:hover {
            color: var(--lavender);
            border-color: var(--lavender);
        }

        .contact-note {
            max-width: 620px;
            margin-top: 2rem;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .legal-footer {
            border-top: 1px solid var(--border);
            padding: 3rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-logo {
            display: inline-flex;
            align-items: center;
            line-height: 0;
            opacity: 0.82;
            text-decoration: none;
        }

        .footer-logo img {
            display: block;
            width: auto;
            height: clamp(28px, 2.6vw, 36px);
        }

        .footer-copy {
            width: 100%;
            font-size: 0.75rem;
            color: rgba(184, 196, 248, 0.25);
            letter-spacing: 0.05em;
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            nav {
                padding: 1.2rem 1.5rem;
                align-items: flex-start;
                gap: 1rem;
                flex-direction: column;
            }

            .nav-logo {
                width: clamp(180px, 56vw, 320px);
            }

            .nav-links,
            .footer-links {
                gap: 1rem;
            }

            .page-hero {
                padding: 10rem 1.5rem 3rem;
            }

            .contact-wrapper {
                padding: 3rem 1.5rem 5rem;
            }

            .contact-panel {
                padding: 1.5rem;
            }

            .legal-footer {
                padding: 2rem 1.5rem;
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>

    <link rel="icon" type="image/x-icon" href="assets/branding/favicon-light.ico" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/branding/favicon-32-light.png" media="(prefers-color-scheme: light)">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/branding/apple-touch-icon-light.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="assets/branding/favicon-dark.ico" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/branding/favicon-32-dark.png" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/branding/apple-touch-icon-dark.png" media="(prefers-color-scheme: dark)">
</head>

<body data-footer-type="legal" data-active-page="contact">
    <div data-dreamz-nav></div>

    <header class="page-hero">
        <p class="page-eyebrow">Contact</p>
        <h1 class="page-title">Contact Us</h1>
        <p class="page-intro">For product questions, support requests, partnerships, or anything else Dreamz-related, reach us here.</p>
    </header>

    <main class="contact-wrapper">
        <section class="contact-panel" aria-label="Dreamz contact information">
            <div class="contact-item">
                <span class="contact-label">Email</span>
                <p class="contact-value"><a href="mailto:support@hypnodreamz.com">support@hypnodreamz.com</a></p>
            </div>
            <div class="contact-item">
                <span class="contact-label">Address</span>
                <p class="contact-value">2195 Hearst Ave<br>Berkeley, CA 94720</p>
            </div>
        </section>
        <p class="contact-note">We read every message and will route your note to the right person on the Dreamz team.</p>
    </main>

    <div data-dreamz-footer></div>
<script src="assets/site-chrome.js"></script>
</body>

</html>
